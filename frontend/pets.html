<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pets para Adoção - Toca dos Peludos</title>
    <link rel="icon" type="image/png" href="img/logo-tdp-ícone.png">
    <link rel="stylesheet" href="css/style_pets.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style_global.css">
  </head>
  <body>
    <!-- Componentes globais --> 
    <global-header></global-header>
    <main class="container-principal">
      <section class="secao-filtro">
        <h1>Encontre seu novo melhor amigo</h1>
        <div class="filtro-container">
          <input type="text" id="inputBusca" placeholder="Pesquisar por nome..." class="campo-busca">
          <select id="filtroTipo" class="select-filtro">
            <option value="todos">Todos os Pets</option>
            <option value="cachorro">Cachorros</option>
            <option value="gato">Gatos</option>
          </select>
          <button id="btnFiltrar" class="btn-filtrar">Filtrar</button>
        </div>
      </section>
      <div id="listaPets" class="grid-pets"></div>
    </main>
    <!-- Componentes globais -->
    <chat-ia></chat-ia>
    <global-footer></global-footer>
    <script src="js/apiScript.js"></script>
    <script src="js/pets.js"></script>
    <script src="js/global.js" defer></script>
    <script src="js/chatIA.js" defer></script>
  </body>
</html>
