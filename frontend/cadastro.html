<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Toca dos Peludos</title>
    <link rel="icon" type="image/png" href="img/logo-tdp-ícone.png">
    <link rel="stylesheet" href="css/style_cadastro.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style_global.css">
  </head>
  <body>
    <!-- Componentes globais --> 
    <global-header></global-header>
    <div class="cadastro_container">
      <div class="cadastro_form">
        <h3>Cadastro</h3>
        <form id="form-cadastro" class="formCadastro">
          <input id="nomeCadastro" type="text" placeholder="Nome" required>
          <input id="sobrenomeCadastro" type="text" placeholder="Sobrenome" required>
          <input id="dataNascimento" type="date" name="dataNascimento" required>
          <input id="telefoneCadastro" type="tel" placeholder="Telefone" required>
          <input id="emailCadastro" type="email" placeholder="Email" required>
          <select id="generoCadastro" required>
            <option value="" disabled selected hidden>Gênero</option>
            <option value="feminino">Feminino</option>
            <option value="masculino">Masculino</option>
            <option value="outro">Outro</option>
          </select>
          <input id="cpfCadastro" type="text" maxlength="11" placeholder="CPF" required>
          <input id="cepCadastro" type="text" maxlength="8" placeholder="CEP" required>
          <input id="enderecoCadastro" type="text" placeholder="Endereço" required>
          <input id="numeroCadastro" type="text" maxlength="5" placeholder="Número" required>
          <input id="complementoCadastro" type="text" placeholder="Complemento">
          <input id="cidadeCadastro" type="text" placeholder="Cidade" required>
          <input id="estadoCadastro" type="text" placeholder="UF" required>
          <input id="senhaCadastro" type="password" placeholder="Senha" required>
          <input id="confirmaSenhaCadastro" type="password" placeholder="Confirme a Senha" required>
          <button type="submit" class="btn_cadastro">Cadastrar-se</button>
        </form>
        <p id="mensagemCadastro" class="mensagem-feedback"></p>
      </div>
    </div>
  <!-- Componentes globais -->
  <chat-ia></chat-ia>
  <global-footer></global-footer>
  <script src="js/apiScript.js"></script>
  <script src="js/cadastro.js"></script>
  <script src="js/global.js" defer></script>
  <script src="js/chatIA.js" defer></script>
  </body>
</html>
