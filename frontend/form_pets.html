<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Visita ao Pet - Toca dos Peludos</title>
    <link rel="icon" type="image/png" href="img/logo-tdp-ícone.png">
    <link rel="stylesheet" href="css/style_form_pets.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@400;500&display=swap">
    <link rel="stylesheet" href="css/style_global.css">
  </head>
  <body>
    <!-- Componentes globais --> 
    <global-header></global-header>
    <main class="container-detalhes">
      <section id="detalhesPet" class="detalhes-pet-card"></section>
      <aside class="agendamento-card">
        <div class="agendamento-form-container">
          <h2>Agendar visita</h2>
          <p class="agendamento-subtitulo"> Preencha os dados abaixo para solicitar uma visita e conhecer esse pet.</p>
          <form id="formAgendamento" class="form-agendamento">
            <label for="nomeInteressado" class="label_text required-label">Nome</label>
            <input type="text" id="nomeInteressado" placeholder="Nome completo" required>
            <label for="emailInteressado" class="label_text required-label">Email</label>
            <input type="email" id="emailInteressado" placeholder="E-mail" required>
            <label for="telefoneInteressado" class="label_text required-label">Telefone</label>
            <input type="tel" id="telefoneInteressado" placeholder="Telefone" required>
            <label for="cepInteressado" class="label_text required-label">CEP</label>
            <input type="text" id="cepInteressado" placeholder="CEP" required>
            <label for="endereçoInteressado" class="label_text required-label">Endereço</label>
            <input type="text" id="endereçoInteressado" placeholder="Endereço" required>
            <label for="numeroInteressado" class="label_text required-label">Número</label>
            <input type="text" id="numeroInteressado" placeholder="Número" required>
            <label for="complementoInteressado" class="label_text required-label">Complemento</label>
            <input type="text" id="complementoInteressado" placeholder="Complemento" required>
            <label for="cidadeInteressado" class="label_text required-label">Cidade</label>
            <input type="text" id="cidadeInteressado" placeholder="Cidade" required>
            <label for="ufInteressado" class="label_text required-label">UF</label>
            <input type="text" id="ufInteressado" placeholder="UF" required>
            <label class="label_text required-label">Imagens do Local ou da Residência</label>
            <div class="upload-container">
              <input type="file" id="imgLocal" accept="image/*" required>
              <label for="imgLocal" class="btn-upload" id="labelImgLocal">
                📸 Selecionar fotos do Local
              </label>
            <label for="dataVisita" class="label_text required-label">Data da visita</label>
            <input type="date" id="dataVisita" required>
            <label for="horarioVisita" class="label_text required-label">Horário da visita</label>
            <input type="time" id="horarioVisita" required>
            <label for="observacoesAgendamento" class="label_text">Observações</label>
            <textarea id="observacoesAgendamento" placeholder="Observações adicionais (opcional)"></textarea>
            <button type="submit" class="btn-agendar">Agendar visita</button>
          </form>
          <p id="mensagemAgendamento" class="mensagem-agendamento"></p>
        </div>
      </aside>
    </main>
    <!-- Componentes globais -->
    <chat-ia></chat-ia>
    <global-footer></global-footer>
    <script src="js/apiScript.js"></script>
    <script src="js/form_pets.js"></script>
    <script src="js/global.js" defer></script>
    <script src="js/chatIA.js" defer></script>
  </body>
</html>
