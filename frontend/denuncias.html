<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denunciar - Toca dos Peludos</title>
    <link rel="icon" type="image/png" href="img/logo-tdp-ícone.png">
    <link rel="stylesheet" href="css/style_forms_denuncias.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style_global.css">
  </head>
  <body>
    <!-- Componentes globais --> 
    <global-header></global-header>
    <div class="container">
      <!-- Coluna esquerda -->
      <div class="sidebar">
        <h3>Contatos de Emergência</h3>
        <div class="card">
          <div class="icon">🛡</div>
          <div>
            <strong>IBAMA</strong><br>
            <span>0800 618 080</span>
          </div>
        </div>
        <div class="card">
          <div class="icon">⚠</div>
          <div>
            <strong>Polícia Ambiental</strong><br>
            <span>190</span>
          </div>
        </div>
        <div class="card">
          <div class="icon">❤</div>
          <div>
            <strong>CCZ - Centro de Zoonoses</strong><br>
            <span>(11) 3397-8900</span>
          </div>
        </div>
        <div class="card important">
          <div class="icon">💡</div>
          <div>
            <strong>Importante</strong><br>
            <span>Em casos de emergência, ligue imediatamente para os órgãos competentes.</span>
          </div>
        </div>
      </div>
      <!-- Coluna direita -->
      <div class="form-container">
        <h2>Formulário de Denúncia</h2>
        <form id="formDenuncia">
          <div class="grupo-input">
          <label class="required-label">Tipo de Denúncia</label>
          <select id="tipoDenuncia" required>
            <option value="" disabled selected>Selecione o tipo</option>
            <option>Maus-tratos</option>
            <option>Abandono</option>
            <option>Desmatamento</option>
            <option value="outros">Outros</option>
          </select>
          </div>
          <div class="grupo-input">
            <label class="required-label">Descreva a Situação</label>
            <textarea id="descricaoDenuncia" placeholder="Forneça o máximo de detalhes possível sobre a situação." required></textarea>
          </div>
          <div class="grupo-input">
            <label class="required-label">Local da Ocorrência</label>
            <input id="localDenuncia" type="text" placeholder="Endereço ou ponto de referência" required>
          </div>
          <div class="grupo-input">
            <label class="required-label">Imagens da Situação</label>
            <div class="upload-container">
              <input type="file" id="imgDenuncia" accept="image/*">
              <label for="imgDenuncia" class="btn-upload" id="labelImgDenuncia">
                📸 Selecionar fotos da ocorrência
              </label>
            </div>
          </div>
          <div id="options_container">
            <input type="checkbox" id="anonimoCheckbox">
            <label for="anonimoCheckbox">Fazer denúncia anônima</label>
          </div>
          <div class="grupo-input">
            <label>Contato</label>
            <input id="contatoDenuncia" type="text" placeholder="E-mail ou telefone (opcional)">
          </div>
          <button class="btn-confirm" type="submit">Cadastrar Denúncia</button>
          <p id="mensagemDenuncia"></p>
        </form>
      </div>
    </div>
    <!-- Componentes globais -->
    <chat-ia></chat-ia>
    <global-footer></global-footer>
    <script src="js/apiScript.js"></script>
    <script src="js/denuncias.js"></script>
    <script src="js/global.js" defer></script>
    <script src="js/chatIA.js" defer></script>
  </body>
</html>
