<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste - Toca dos Peludos</title>
    <link rel="icon" type="image/png" href="img/logo-tdp-ícone.png">
    <link rel="stylesheet" href="css/style_adminteste.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style_global.css">
  </head>
  <body>
    <!-- Componentes globais --> 
    <global-header></global-header>
    <div class="app-container">      
      <aside class="sidebar">
        <div class="logo">Dashboard</div>    
        <ul class="nav-links">
          <li class="has-submenu" id="menu-pets">
            <div class="menu-toggle"><span>🐾</span> Pets</div>
            <ul class="submenu">
              <li data-dashboard="pets" data-view="graficos" class="active"><span>📊</span> Gráficos</li>
              <li data-dashboard="pets" data-view="tabelas"><span>📋</span> Tabelas</li>
            </ul>
          </li>
          <li class="has-submenu" id="menu-eventos">
            <div class="menu-toggle"><span>🎉</span> Eventos</div>
            <ul class="submenu">
              <li data-dashboard="eventos" data-view="graficos"><span>📊</span> Gráficos</li>
              <li data-dashboard="eventos" data-view="tabelas"><span>📋</span> Tabelas</li>
            </ul>
          </li>
          <li data-dashboard="denuncias"><span>🚨</span> Denúncias</li>
          <li data-dashboard="inscricoes"><span>📝</span> Inscrições</li>
          <li data-dashboard="agendamentos"><span>📅</span> Agendamentos</li>
          <li data-dashboard="doacoes"><span>💰</span> Doações</li>
          <li data-dashboard="usuarios"><span>👥</span> Usuários</li>
          <li data-dashboard="configuracoes"><span>⚙️</span> Configurações</li>
        </ul>
      </aside>
      <!-- Área do dashboard -->
      <main class="main-content" id="dashboard-content"></main>
    </div>
    <script src="js/apiScript.js"></script>
    <script src="js/painel_admin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="js/painel_grafico.js"></script>
    <script src="js/global.js" defer></script>
  </body>
</html>
