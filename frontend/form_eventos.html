<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Presença - Toca dos Peludos</title>
    <link rel="icon" type="image/png" href="img/logo-tdp-ícone.png">
    <link rel="stylesheet" href="css/style_form_eventos.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style_global.css">
  </head>
  <body>
    <!-- Componentes globais --> 
    <global-header></global-header>
    <div class="container">
      <div class="form-container">
      <h2>Formulário de Presença</h2>
        <form id="formEventos">  
          <p class="evento-selecionado">
            <strong>Evento:</strong>
            <span id="nomeEventoSelecionado">Carregando evento...</span>
          </p>
          <input type="hidden" id="eventoId">
          <label class="label_text required-label">Nome</label>
          <input id="nome" type="text" placeholder="Nome completo" required>
          <label class="label_text required-label">Email</label>
          <input id="email" type="email" placeholder="E-mail" required>
          <label class="label_text required-label">Telefone</label>
          <input id="telefone" type="tel" placeholder="Telefone" required>
          <label class="label_text required-label">Quantidade de Pessoas</label>
          <input id="quantidadePessoas" type="number" min="1" value="1" placeholder="Digite a quantidade de pessoas que irão lhe acompanhar" required>
          <label class="label_text">Observações</label>
          <textarea id="observacoes" placeholder="Observações adicionais (opcional)"></textarea>
          <button class="btn-confirm" type="submit">Confirmar Presença</button>
        </form>
        <p id="mensagemFormulario"></p>
      </div>
    </div>
    <!-- Componentes globais -->
    <chat-ia></chat-ia>
    <global-footer></global-footer>
    <script src="js/apiScript.js"></script>
    <script src="js/form_eventos.js"></script>
    <script src="js/global.js" defer></script>
  </body>
</html>
