<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatos - Toca dos Peludos</title>
    <link rel="icon" type="image/png" href="img/logo-tdp-ícone.png">
    <link rel="stylesheet" href="css/style_contatos.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style_global.css">
  </head>
  <body>
    <!-- Componentes globais --> 
    <global-header></global-header>
    <section class="secao-contato">
      <div class="topo-contato">
        <div class="caixa-logo">
          <img src="img/logo-tdp.jpg" class="logo" alt="Logo Toca dos Peludos">
        </div>
        <div class="maps">
          <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d14661.614873647815!2d-46.60360015709348!3d-23.264775900993946!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94ceec0c06dee097%3A0xf5d1a3fd5cf68533!2sTerra%20Preta%2C%20Mairipor%C3%A3%20-%20SP%2C%2007600-000!5e0!3m2!1spt-BR!2sbr!4v1771959801264!5m2!1spt-BR!2sbr"style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
      </div>
      <div class="contato-cards">
        <div class="contato-card">
          <span>📍</span>
          <h3>Endereço</h3>
          <a href="https://maps.app.goo.gl/SbaMEa1A5nvMwUBB9" target="_blank" rel="noopener noreferrer">Ver localização</a>
        </div>
        <div class="contato-card">
          <span>📞</span>
          <h3>Telefone</h3>
          <a href="tel:+5511933205642">(11) 93320-5642</a>
        </div>  
        <div class="contato-card">
          <span>✉️</span>
          <h3>Email</h3>
          <a href="mailto:atocadospeludos@gmail.com">Enviar email</a>
        </div>
        <div class="contato-card">
          <span>📱</span>
          <h3>Instagram</h3>
          <a href="https://www.instagram.com/toca_dos_peludos/" target="_blank" rel="noopener noreferrer">@toca_dos_peludos</a>
        </div>
      </div>
    </section>
    <div class="horario-funcionamento">
      <h2>🕒 Horário de Funcionamento</h2>
      <div class="horario-box">
        <p><strong>Segunda a Sexta:</strong> 09:00 – 18:00</p>
        <p><strong>Sábado:</strong> 10:00 – 16:00</p>
        <p><strong>Domingo:</strong> Fechado</p>
      </div>
      <span id="statusAberto" class="status"></span>
    </div>
    <!-- Componentes globais -->
    <chat-ia></chat-ia>
    <global-footer></global-footer>
    <script src="js/contatos.js"></script>
    <script src="js/apiScript.js"></script>
    <script src="js/global.js" defer></script>
    <script src="js/chatIA.js" defer></script>
  </body>
</html>
