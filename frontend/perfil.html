<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Toca dos Peludos</title>
    <link rel="icon" type="image/png" href="img/logo-tdp-ícone.png">
    <link rel="stylesheet" href="css/style_denuncias.css"> <!-- Esse CSS está desatualizado e errado -->
    <link rel="stylesheet" href="css/style_global.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Componentes globais --> 
    <global-header></global-header>
    <main style="max-width: 1000px; margin: 40px auto; padding: 20px;">
      <h2 style="color: #6A1B9A; margin-bottom: 30px;">Meu Perfil</h2>  
      <div id="infoUsuario" style="background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 30px;">
      </div>
      <h3 style="color: #ffcc33; background: #6A1B9A; padding: 10px 20px; border-radius: 8px;">Minhas Visitas a Pets</h3>
      <div id="listaVisitas" style="margin-bottom: 40px;">
        <p>A carregar visitas...</p>
      </div>
      <h3 style="color: #ffcc33; background: #6A1B9A; padding: 10px 20px; border-radius: 8px;">Meus Eventos</h3>
      <div id="listaEventos">
        <p>A carregar eventos...</p>
      </div>
    </main>        
    <!-- Componentes globais -->
    <chat-ia></chat-ia>
    <global-footer></global-footer>
    <script src="js/apiScript.js"></script>
    <script src="js/perfil.js"></script>
    <script src="js/global.js" defer></script>
  </body>
</html>
