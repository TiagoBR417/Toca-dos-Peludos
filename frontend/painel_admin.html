<body>
 <header class="nav">
    <div class="nav-content">
      <div class="brand">
        <a href="index.html">
          <img src="img/logo-tdp.jpg" class="logo" alt="Logo Toca dos Peludos">
        </a>
        <span>Toca dos Peludos</span>
      </div>
      <nav class="links">
        <a href="index.html">Início</a>
        <a href="sobre_nos.html">Sobre</a>
        <a href="pets.html">Pets</a>
        <a href="eventos.html">Eventos</a>
        <a href="denuncias.html">Denúncias</a>
        <a href="contatos.html">Contatos</a>
      </nav>


      <div class="menu-sanduiche">
        <div class="linha"></div>
        <div class="linha"></div>
        <div class="linha"></div>
      </div>


      <div class="actions">
        <a href="login.html">
            <button class="btn-accent">Entrar</button>
        </a>
        <a href="index.html#ajude">
          <button class="btn-accent">Doar</button>
        </a>
      </div>
    </div>
  </header>
    <!--Painel Principal-->
  <div class="dashboard">
    <div class="banner">
      <h2>Painel Administrativo</h2>
      <p>Gerencie pets, adoções, voluntariados e mais.</p>
    </div>
 
 
    <div class="cards-container">
      <div class="card admin-tab" data-section="pets">
        <div class="icon">🐾</div>
        <div class="info">
          <span class="numero">4</span>
          <span class="label">Pets disponíveis</span>
        </div>
      </div>
 


  <div class="card admin-tab" data-section="eventos">
    <div class="icon">🎪</div>
    <div class="info">
      <span class="numero">8</span>
      <span class="label">Eventos</span>
    </div>
  </div>

  <div class="card admin-tab" data-section="denuncias">
    <div class="icon">⚠️</div>
    <div class="info">
      <span class="numero">8</span>
      <span class="label">Denúncias</span>
    </div>
  </div>

  <div class="card admin-tab" data-section="inscricoes">
    <div class="icon">📝</div>
    <div class="info">
      <span class="numero">67</span>
      <span class="label">Inscrições</span>
    </div>
  </div>

  <div class="card admin-tab" data-section="agendamentos">
    <div class="icon">📅</div>
    <div class="info">
      <span class="numero">12</span>
      <span class="label">Agendamentos</span>
    </div>
  </div>
</div>

<div id="adminMensagem" class="admin-mensagem"></div>
<div id="adminTabela"></div>

//modal para descrição dos pets

<div id="modalPet" class="modal-admin">
  <div class="modal-conteudo">
    <span class="fechar-modal" onclick="fecharModalPet()">&times;</span>
    <h3 id="modalPetTitulo">Detalhes do Pet</h3>
    
    <form id="formEditarPet">
      <input type="hidden" id="editPetId">
      
      <label class="label_text">Nome:</label>
      <input type="text" id="editPetNome" required>
      
      <label class="label_text">Status:</label>
      <select id="editPetStatus" required>
        <option value="disponivel">Disponível</option>
        <option value="adotado">Adotado</option>
      </select>
      
      <label class="label_text">Descrição:</label>
      <textarea id="editPetDescricao" rows="5" required></textarea>
      
      <button type="submit" class="btn-accent" style="width: 100%; margin-top: 15px;">Salvar Alterações</button>
    </form>
    <p id="msgEditPet" class="admin-mensagem"></p>
  </div>
</div>

<script src="js/apiScript.js"></script>
<script src="js/painel_admin.js"></script>


</body>
</html>
